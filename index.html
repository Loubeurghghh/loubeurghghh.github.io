<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hexblood</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;500;700&family=Inter:wght@300&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #0b0b0b;
  color: #e5e5e5;
  font-family: 'Inter', sans-serif;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* Subtle grain effect */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: url("https://www.transparenttextures.com/patterns/asfalt-dark.png");
  opacity: 0.2;
  pointer-events: none;
}

header {
  text-align: center;
  padding: 140px 20px 80px;
}

h1 {
  font-family: 'Oswald', sans-serif;
  font-size: 4rem;
  letter-spacing: 8px;
  font-weight: 700;
  color: #ffffff;
}

.tagline {
  margin-top: 20px;
  font-size: 0.9rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  opacity: 0.5;
}

.links {
  margin-top: 60px;
}

.links a {
  display: inline-block;
  margin: 12px 20px;
  padding: 14px 28px;
  border: 1px solid #a11212;
  color: #a11212;
  text-decoration: none;
  letter-spacing: 2px;
  font-size: 0.85rem;
  transition: all 0.3s ease;
}

.links a:hover {
  background: #a11212;
  color: #000;
  box-shadow: 0 0 20px rgba(161,18,18,0.6);
}

.section {
  max-width: 800px;
  margin: 80px auto;
  padding: 0 20px;
  text-align: center;
}

.section h2 {
  font-family: 'Oswald', sans-serif;
  letter-spacing: 4px;
  margin-bottom: 20px;
}

.section p {
  opacity: 0.7;
  line-height: 1.6;
}

footer {
  margin-top: auto;
  padding: 40px 20px;
  text-align: center;
  font-size: 0.7rem;
  letter-spacing: 2px;
  opacity: 0.3;
}

@media (max-width: 600px) {
  h1 {
    font-size: 2.5rem;
  }

  .links a {
    display: block;
    width: 220px;
    margin: 12px auto;
  }
}
</style>
</head>g

<body>

<header>
   <img src="/images/HexbloodLogoTransparent.png" width="999" height="333" alt="Hexblood Logo" class="logo"> 
  <div class="tagline">Sludge • Doom • Riffs</div>

    <div class="links">
      <a href="https://instagram.com/hexbloodmusic" target="_blank">Instagram</a>
      <a href="https://www.facebook.com/hexbloodmusic" target="_blank">Facebook</a>
      <a href="https://open.spotify.com/artist/3jNOsDjkmFFn141kEjs0o4" target="_blank">Spotify</a>
      <a href="https://youtube.com/@hexbloodmusic" target="_blank">YouTube</a>
      <a href="mailto:band@hexblood.com">Booking</a>
    </div>
  </header>

  <footer>
    © 2026 Hexblood
  </footer>

</body>
</html>
